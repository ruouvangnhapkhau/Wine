<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sản phẩm</title>

<style>
body { margin:0; font-family:Arial; background:#007bff; color:white; }

.header {
    background:#003366;
    padding:15px;
    text-align:center;
    position:relative;
}

.hamburger {
    position:absolute;
    left:15px;
    cursor:pointer;
}

.menu {
    position:fixed;
    left:-250px;
    top:0;
    width:250px;
    height:100%;
    background:#003366;
    padding-top:60px;
    transition:0.3s;
}
.menu a { display:block; padding:15px; color:white; }

.menu.active { left:0; }

#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
}
#overlay.active { display:block; }

.products {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.product {
    background:#f1f1f1;
    border-radius:12px;
    overflow:hidden;
    color:black;
}

.product img { width:100%; height:120px; }

.price { color:#007bff; font-weight:bold; }

.section { display:none; background:white; color:black; padding:15px; }
.active { display:block; }

.footer {
    position:fixed;
    bottom:0;
    width:100%;
    background:#003366;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
.footer button { color:white; background:none; border:none; }
</style>
</head>

<body>

<div class="header">
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <h2>WINE</h2>
</div>

<div id="menu" class="menu">
    <a href="giohang.html">Giỏ hàng</a>
    <a href="call.html">Thông tin liên hệ</a>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="products" class="section active">
<h3>Sản phẩm</h3>

<div class="products">

<div class="product" onclick="showDetail('Rượu vang','anh1.png','450000')">
<img src="anh1.png">
<p>Rượu vang</p>
<p class="price">450.000đ</p>
</div>

<div class="product" onclick="showDetail('Whisky','anh2.png','890000')">
<img src="anh2.png">
<p>Whisky</p>
<p class="price">890.000đ</p>
</div>

<div class="product" onclick="showDetail('Vodka','anh3.png','300000')">
<img src="anh3.png">
<p>Vodka</p>
<p class="price">300.000đ</p>
</div>

<div class="product" onclick="showDetail('Gin','anh4.png','400000')">
<img src="anh4.png">
<p>Gin</p>
<p class="price">400.000đ</p>
</div>

</div>
</div>

<div id="detail" class="section">
<h3 id="d-name"></h3>
<img id="d-img" width="100%">
<p id="d-price"></p>

<button onclick="buy()">Mua ngay</button>
<button onclick="showPage('products')">← Quay lại</button>
</div>

<div class="footer">
<button onclick="location.href='sanpham.html'">🛒</button>
<button onclick="location.href='index.html'">🏠</button>
<button onclick="location.href='info.html'">👤</button>
</div>

<script>
let balance = localStorage.getItem("money") || 2000000;
let currentPrice = 0;

function toggleMenu(){
    menu.classList.toggle("active");
    overlay.classList.toggle("active");
}

function showPage(p){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(p).classList.add('active');
}

function showDetail(name,img,price){
    d-name.innerText=name;
    d-img.src=img;
    d-price.innerText=price+"đ";
    currentPrice=parseInt(price);
    showPage("detail");
}

function buy(){
    if(balance>=currentPrice){
        balance-=currentPrice;
        localStorage.setItem("money", balance);
        alert("Mua thành công!");
    }else{
        alert("Không đủ tiền!");
    }
}
</script>

</body>
</html>
