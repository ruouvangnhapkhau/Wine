<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sản phẩm</title>

<style>
body { margin:0; font-family:Arial; background:#007bff; color:white; padding-bottom:70px; }

.header { background:#003366; padding:15px; text-align:center; position:relative; }
.hamburger { position:absolute; left:15px; cursor:pointer; font-size:20px; }

.menu {
    position:fixed; left:-70%; top:0;
    width:70%; height:100%;
    background:#003366; padding-top:60px;
    transition:0.3s; z-index:1000;
}
.menu a { display:block; padding:15px; color:white; text-decoration:none; }
.menu.active { left:0; }

#overlay {
    position:fixed; width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    display:none; z-index:999;
}
#overlay.active { display:block; }

.products {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap:10px;
    padding:10px;
}

.product {
    background:#f1f1f1;
    border-radius:12px;
    overflow:hidden;
    color:black;
}

.product img {
    width:100%;
    height:120px;
    object-fit:cover;
}

.product p { margin:5px; }
.price { color:#007bff; font-weight:bold; }

.section { display:none; background:white; color:black; padding:15px; }
.active { display:block; }

button {
    padding:10px;
    margin:5px 0;
    width:100%;
    border:none;
    border-radius:8px;
    background:#003366;
    color:white;
    font-size:16px;
}

.footer {
    position:fixed; bottom:0; width:100%;
    background:#003366;
    display:flex; justify-content:space-around;
    padding:10px 0;
}
.footer button { background:none; font-size:18px; }
</style>
</head>

<body>

<div class="header">
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <h2><a href="index.html" style="color:white;text-decoration:none;">WINE</a></h2>
</div>

<div id="menu" class="menu">
    <a href="giohang.html">Giỏ hàng</a>
    <a href="call.html">Thông tin liên hệ</a>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="products" class="section active">
<h3>Sản phẩm</h3>

<div class="products">

<div class="product" onclick="showDetail('Rượu vang','https://i.postimg.cc/0jZQ9zBy/anh1.png','450000','13%','750ml','Pháp')">
<img src="https://i.postimg.cc/0jZQ9zBy/anh1.png">
<p>Rượu vang</p>
<p class="price">450.000đ</p>
</div>

<div class="product" onclick="showDetail('Whisky','https://i.postimg.cc/9QwWngCq/anh2.jpg','890000','40%','700ml','Scotland')">
<img src="https://i.postimg.cc/9QwWngCq/anh2.jpg">
<p>Whisky</p>
<p class="price">890.000đ</p>
</div>

<div class="product" onclick="showDetail('Vodka','https://i.postimg.cc/gJsdZfHk/anh3.jpg','300000','40%','750ml','Nga')">
<img src="https://i.postimg.cc/gJsdZfHk/anh3.jpg">
<p>Vodka</p>
<p class="price">300.000đ</p>
</div>

<div class="product" onclick="showDetail('Gin','https://i.postimg.cc/VvH87nh9/anh4.jpg','400000','37.5%','700ml','Anh')">
<img src="https://i.postimg.cc/VvH87nh9/anh4.jpg">
<p>Gin</p>
<p class="price">400.000đ</p>
</div>

<!-- CHIVAS 25 -->
<div class="product" onclick="showDetail(
'Chivas Regal 25',
'https://i.postimg.cc/dtHfyqMj/Messenger-creation-2177766999627752.jpg',
'4500000',
'40%',
'700ml',
'Scotland'
)">
<img src="https://i.postimg.cc/dtHfyqMj/Messenger-creation-2177766999627752.jpg">
<p>Chivas 25</p>
<p class="price">4.500.000đ</p>
</div>

<!-- VERY SPECIAL (Hennessy VS) -->
<div class="product" onclick="showDetail(
'Hennessy Very Special (VS)',
'https://i.postimg.cc/hPdm9r6s/Messenger-creation-1518202079865617.jpg',
'950000',
'40%',
'700ml',
'Pháp'
)">
<img src="https://i.postimg.cc/hPdm9r6s/Messenger-creation-1518202079865617.jpg">
<p>Very Special</p>
<p class="price">950.000đ</p>
</div>

</div>
</div>

<div id="detail" class="section">
<h3 id="d-name"></h3>
<img id="d-img" width="100%">
<p id="d-price" class="price"></p>
<p id="d-info"></p>

<button onclick="addToCart()">🛒 Thêm vào giỏ</button>
<button onclick="showPage('products')">← Quay lại</button>
</div>

<div class="footer">
<button onclick="location.href='sanpham.html'">🛒</button>
<button onclick="location.href='index.html'">🏠</button>
<button onclick="location.href='info.html'">👤</button>
</div>

<script>
let currentPrice = 0;

function toggleMenu(){
    menu.classList.toggle("active");
    overlay.classList.toggle("active");
}

function showPage(p){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(p).classList.add('active');
}

function showDetail(name,img,price,alcohol,volume,origin){
    document.getElementById("d-name").innerText = name;
    document.getElementById("d-img").src = img;
    document.getElementById("d-price").innerText = price + "đ";

    document.getElementById("d-info").innerHTML =
        "<b>Nồng độ:</b> " + alcohol + "<br>" +
        "<b>Dung tích:</b> " + volume + "<br>" +
        "<b>Xuất xứ:</b> " + origin;

    currentPrice = parseInt(price);
    showPage("detail");
}

function addToCart(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let product = {
        name: document.getElementById("d-name").innerText,
        price: currentPrice,
        img: document.getElementById("d-img").src
    };

    cart.push(product);
    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Đã thêm vào giỏ hàng!");
}
</script>

</body>
</html>
