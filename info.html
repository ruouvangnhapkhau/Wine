<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<!-- ✅ MOBILE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thông tin</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#007bff;
    color:white;
    text-align:center;
    padding-bottom:70px;
}

/* HEADER */
.header {
    background:#003366;
    padding:15px;
    position:relative;
}

.hamburger {
    position:absolute;
    left:15px;
    cursor:pointer;
    font-size:20px;
}

/* MENU */
.menu {
    position:fixed;
    left:-70%;
    top:0;
    width:70%;
    height:100%;
    background:#003366;
    padding-top:60px;
    transition:0.3s;
    z-index:1000;
}

.menu a {
    display:block;
    padding:15px;
    color:white;
    text-decoration:none;
    font-size:16px;
}

.menu a:hover {
    background:#007bff;
}

.menu.active { left:0; }

/* OVERLAY */
#overlay {
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:999;
}

#overlay.active { display:block; }

/* AVATAR */
.avatar {
    width:90px;
    height:90px;
    border-radius:50%;
    margin-top:20px;
    object-fit:cover;
}

/* TEXT */
h2 {
    margin-top:10px;
    font-size:20px;
}

p {
    font-size:15px;
}

/* CARD INFO */
.info-box {
    background:white;
    color:black;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

/* FOOTER */
.footer {
    position:fixed;
    bottom:0;
    width:100%;
    background:#003366;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
}

.footer button {
    color:white;
    background:none;
    border:none;
    font-size:18px;
}

/* RESPONSIVE */
@media (max-width:600px){
    h2 { font-size:18px; }
}
</style>
</head>

<body>

<div class="header">
    <div class="hamburger" onclick="toggleMenu()">☰</div>
    <h2>WINE</h2>
</div>

<div id="menu" class="menu">
    <a href="giohang.html">Giỏ hàng</a>
    <a href="call.html">Thông tin liên hệ</a>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<h2>Thông tin cá nhân</h2>

<img class="avatar" src="https://i.postimg.cc/bNcg2Gsv/Messenger-creation-2167886443955803.jpg">

<div class="info-box">
    <p><b>Tên:</b> champagne</p>
    <p id="money"></p>
</div>

<div class="footer">
    <button onclick="location.href='sanpham.html'">🛒</button>
    <button onclick="location.href='index.html'">🏠</button>
    <button onclick="location.href='info.html'">👤</button>
</div>

<script>
function toggleMenu(){
    menu.classList.toggle("active");
    overlay.classList.toggle("active");
}

let money = localStorage.getItem("money") || 2000000;
document.getElementById("money").innerText =
    "Số dư: " + Number(money).toLocaleString() + "đ";
</script>

</body>
</html>
